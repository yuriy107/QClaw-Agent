<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Arial', sans-serif;
  color: #eee;
}
.game-container {
  text-align: center;
}
h1 {
  font-size: 2rem;
  margin-bottom: 10px;
  color: #0f0;
  text-shadow: 0 0 10px #0f0;
}
.info {
  display: flex;
  justify-content: space-between;
  max-width: 400px;
  margin: 0 auto 10px;
  font-size: 1.1rem;
}
canvas {
  border: 3px solid #0f0;
  border-radius: 6px;
  background: #16213e;
  box-shadow: 0 0 20px rgba(0,255,0,0.3);
}
.controls {
  margin-top: 15px;
  font-size: 0.9rem;
  color: #aaa;
}
.overlay {
  position: absolute;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.8);
  border-radius: 6px;
  color: #fff;
  font-size: 1.5rem;
  gap: 15px;
}
.overlay button {
  padding: 10px 30px;
  font-size: 1rem;
  background: #0f0;
  color: #000;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
}
.overlay button:hover {
  background: #0c0;
}
</style>
</head>
<body>
<div class="game-container">
  <h1>🐍 贪吃蛇</h1>
  <div class="info">
    <span>得分: <span id="score">0</span></span>
    <span>最高分: <span id="highScore">0</span></span>
  </div>
  <div style="position: relative; display: inline-block;">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay" id="startOverlay">
      <div>🐍 贪吃蛇</div>
      <button onclick="startGame()">开始游戏</button>
    </div>
    <div class="overlay" id="overOverlay">
      <div>游戏结束!</div>
      <div>得分: <span id="finalScore">0</span></div>
      <button onclick="startGame()">再来一局</button>
    </div>
  </div>
  <div class="controls">
    使用 ↑ ↓ ← → 方向键控制 · 空格键暂停
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, score, highScore, gameLoop, paused, gameRunning;

highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
document.getElementById('highScore').textContent = highScore;

function init() {
  snake = [{ x: 10, y: 10 }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  paused = false;
  document.getElementById('score').textContent = 0;
  placeFood();
}

function placeFood() {
  do {
    food = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#1a3a5c';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i * GRID, 0); ctx.lineTo(i * GRID, canvas.height); ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath(); ctx.moveTo(0, i * GRID); ctx.lineTo(canvas.width, i * GRID); ctx.stroke();
  }

  ctx.fillStyle = '#ff6b6b';
  ctx.shadowColor = '#ff6b6b';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  snake.forEach((seg, i) => {
    const alpha = 1 - i / (snake.length + 10);
    ctx.fillStyle = i === 0 ? '#0f0' : `rgba(0, 255, 0, ${alpha})`;
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = i === 0 ? 8 : 0;
    ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
  });
  ctx.shadowBlur = 0;

  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '2rem Arial';
    ctx.textAlign = 'center';
    ctx.fillText('暂停中', canvas.width / 2, canvas.height / 2);
    ctx.font = '0.9rem Arial';
    ctx.fillText('按空格键继续', canvas.width / 2, canvas.height / 2 + 30);
  }
}

function update() {
  if (paused || !gameRunning) return;

  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function gameOver() {
  gameRunning = false;
  clearInterval(gameLoop);
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHighScore', highScore);
    document.getElementById('highScore').textContent = highScore;
  }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('overOverlay').style.display = 'flex';
}

function startGame() {
  document.getElementById('startOverlay').style.display = 'none';
  document.getElementById('overOverlay').style.display = 'none';
  init();
  gameRunning = true;
  paused = false;
  if (gameLoop) clearInterval(gameLoop);
  draw();
  gameLoop = setInterval(update, 120);
}

document.addEventListener('keydown', e => {
  const key = e.key;
  if (key === ' ') {
    e.preventDefault();
    if (!gameRunning && document.getElementById('startOverlay').style.display !== 'flex') {
      startGame();
    } else if (!gameRunning) {
      return;
    } else {
      paused = !paused;
      draw();
    }
    return;
  }
  const map = {
    ArrowUp:    { x: 0, y: -1 },
    ArrowDown:  { x: 0, y: 1 },
    ArrowLeft:  { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 },
    s: { x: 0, y: 1 },
    a: { x: -1, y: 0 },
    d: { x: 1, y: 0 }
  };
  const nd = map[key];
  if (nd && !(nd.x + dir.x === 0 && nd.y + dir.y === 0)) {
    nextDir = nd;
  }
});

document.getElementById('startOverlay').style.display = 'flex';
init();
draw();
</script>
</body>
</html>
